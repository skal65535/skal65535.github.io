<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>GPU vs CPU rasterizer test</title>
<style>
body { font-family: monospace; padding: 1em; }
.row { display:flex; gap:1em; flex-wrap:wrap; margin-top:1em; align-items:flex-start; }
.cv  { display:flex; flex-direction:column; align-items:center; gap:4px; font-size:.85em; }
canvas { border:1px solid #888; image-rendering:pixelated; width:128px; height:128px; }
pre { background:#f0f0f0; padding:.5em; margin:.3em 0; }
.ok   { color:green; }
.fail { color:red; font-weight:bold; }
</style>
</head>
<body>
<h2>GPU vs CPU rasterizer</h2>
<div>
  <label>Image: <input type="file" id="file" accept="image/*"></label>
  &nbsp;<button id="btn">Run (synthetic)</button>
</div>
<div class="row">
  <div class="cv"><canvas id="cRef"></canvas><span>Reference</span></div>
  <div class="cv"><canvas id="cCpu"></canvas><span>CPU (k-means)</span></div>
  <div class="cv"><canvas id="cGpu"></canvas><span>GPU (k-means)</span></div>
  <div class="cv"><canvas id="cCpu2"></canvas><span>CPU (2-tri)</span></div>
  <div class="cv"><canvas id="cGpu2"></canvas><span>GPU (2-tri)</span></div>
</div>
<div id="log" style="margin-top:.5em;"></div>

<script src="triangle-core.js"></script>
<script src="triangle-ans-enc.js"></script>
<script src="triangle-init.js"></script>
<script src="triangle-gpu.js"></script>
<script>
'use strict';
const logEl = document.getElementById('log');

function print(s, ok) {
  const p = document.createElement('pre');
  if (ok === true)  p.className = 'ok';
  if (ok === false) p.className = 'fail';
  p.textContent = s;
  logEl.appendChild(p);
}

function drawRGB(canvas, w, h, rgbF32) {
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const id = ctx.createImageData(w, h);
  for (let i = 0; i < w*h; ++i) {
    id.data[i*4]   = rgbF32[i*3]   | 0;
    id.data[i*4+1] = rgbF32[i*3+1] | 0;
    id.data[i*4+2] = rgbF32[i*3+2] | 0;
    id.data[i*4+3] = 255;
  }
  ctx.putImageData(id, 0, 0);
}

function drawRGBA(canvas, w, h, rgbaF32) {
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const id = ctx.createImageData(w, h);
  for (let i = 0; i < w*h; ++i) {
    id.data[i*4]   = rgbaF32[i*4]   | 0;
    id.data[i*4+1] = rgbaF32[i*4+1] | 0;
    id.data[i*4+2] = rgbaF32[i*4+2] | 0;
    id.data[i*4+3] = 255;
  }
  ctx.putImageData(id, 0, 0);
}

async function readbackTexture(device, texture, gx, gy) {
  const rowPitch = Math.ceil(gx * 4 / 256) * 256;
  const buf = device.createBuffer({ size: rowPitch * gy,
    usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
  const enc = device.createCommandEncoder();
  enc.copyTextureToBuffer({ texture }, { buffer: buf, bytesPerRow: rowPitch }, [gx, gy]);
  device.queue.submit([enc.finish()]);
  await buf.mapAsync(GPUMapMode.READ);
  const src = new Uint8Array(buf.getMappedRange());
  const rgb = new Float32Array(gx * gy * 3);
  for (let y = 0; y < gy; ++y) for (let x = 0; x < gx; ++x) {
    const s = y*rowPitch + x*4, d = (y*gx+x)*3;
    rgb[d] = src[s]; rgb[d+1] = src[s+1]; rgb[d+2] = src[s+2];
  }
  buf.unmap(); buf.destroy();
  return rgb;
}

function cpuSAD(rendered, reference, n) {
  let sum = 0;
  for (let i = 0; i < n; ++i) {
    const ref_a = reference[i*4+3] / 255;
    sum += ref_a * (0.3*Math.abs(rendered[i*4]  -reference[i*4])   / 255
                 + 0.6*Math.abs(rendered[i*4+1]-reference[i*4+1]) / 255
                 + 0.1*Math.abs(rendered[i*4+2]-reference[i*4+2]) / 255);
  }
  return sum / n;
}

function makeSyntheticImage(w, h) {
  const data = new Uint8ClampedArray(w*h*4);
  for (let y = 0; y < h; ++y) for (let x = 0; x < w; ++x) {
    const i = (y*w+x)*4;
    data[i]   = Math.round(x/(w-1)*255);
    data[i+1] = Math.round(y/(h-1)*255);
    data[i+2] = Math.round((1-x/(w-1))*128+64);
    data[i+3] = 255;
  }
  return { data, width:w, height:h };
}

function imageDataFromFile(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const GX = 32, GY = 32;
      const cv = document.createElement('canvas');
      cv.width = GX; cv.height = GY;
      cv.getContext('2d').drawImage(img, 0, 0, GX, GY);
      resolve(cv.getContext('2d').getImageData(0, 0, GX, GY));
      URL.revokeObjectURL(img.src);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

// Minimal 4-corner preview: 2 triangles, palette = exact corner pixel colors.
// Tests pure Gouraud rasterization independent of k-means or vertex placement.
function buildCornersPreview(gx, gy, grid) {
  const getQ = (x, y) => {
    const i = (y*gx+x)*4;
    return RGBtoYCoCg(grid[i], grid[i+1], grid[i+2], grid[i+3]);
  };
  const raw = [getQ(0,0), getQ(gx-1,0), getQ(0,gy-1), getQ(gx-1,gy-1)];
  // sort by (cg, co, y, a)
  const order = [0,1,2,3].sort((a,b) => {
    const pa=raw[a], pb=raw[b];
    return pa.cg!==pb.cg?pa.cg-pb.cg:pa.co!==pb.co?pa.co-pb.co:pa.y-pb.y;
  });
  const color_data = order.map(i => raw[i]);
  const remap = new Int32Array(4); order.forEach((o,ni) => { remap[o]=ni; });
  const preview = {
    grid_x:gx, grid_y:gy, use_noise:false, nb_colors:4, has_alpha:false, nb_pts:0,
    qpts: [
      {x:0,    y:0,    idx:remap[0]}, {x:gx-1, y:0,    idx:remap[1]},
      {x:0,    y:gy-1, idx:remap[2]}, {x:gx-1, y:gy-1, idx:remap[3]},
    ],
  };
  return { preview, color_data };
}

async function run(imgData) {
  logEl.innerHTML = '';
  const GX = imgData.width, GY = imgData.height;

  const grid = sampleGrid(imgData, GX, GY);

  // Test A: k-means palette + greedy placement
  print('--- k-means + greedy ---');
  const { preview, color_data } = buildInitialState(imgData,
    { grid_x:GX, grid_y:GY, nb_colors:8, nb_pts: Math.floor(GX*GY/4) });
  const palRGB = color_data.map(c => YCoCg_to_RGB(c.y, c.co, c.cg, 1));
  const del = new Delaunay(GX, GY, preview.qpts);

  const cpuRender = rasterizeGrid(GX, GY, del.vtx, del.getTriangles(), palRGB);
  const cpuLoss = cpuSAD(cpuRender, grid, GX*GY);
  print(`CPU loss: ${cpuLoss.toFixed(6)}`);

  drawRGBA(document.getElementById('cRef'), GX, GY, grid);
  drawRGBA(document.getElementById('cCpu'), GX, GY, cpuRender);

  let device;
  try { device = await createWebGPUDevice(); }
  catch(e) { print(`WebGPU unavailable: ${e.message}`, false); return; }

  const gpu = new TriangleGPU(device, GX, GY);
  gpu.setReference(grid);
  const gpuLoss = await gpu.computeLoss(del, palRGB);
  print(`GPU loss: ${gpuLoss.toFixed(6)}`);

  const rel = cpuLoss > 0 ? Math.abs(gpuLoss-cpuLoss)/cpuLoss : Math.abs(gpuLoss-cpuLoss);
  const ok  = rel < 0.05;
  print(`Relative diff: ${(rel*100).toFixed(3)}%  →  ${ok?'PASS':'FAIL'} (threshold 5%)`, ok);

  const gpuRGB = await readbackTexture(device, gpu._renderTarget, GX, GY);
  drawRGB(document.getElementById('cGpu'), GX, GY, gpuRGB);

  // Test B: 4 corner colors, 0 interior vertices (2 triangles only)
  print('--- corner palette, 2 triangles ---');
  const { preview: p2, color_data: cd2 } = buildCornersPreview(GX, GY, grid);
  const pal2 = cd2.map(c => YCoCg_to_RGB(c.y, c.co, c.cg, 1));
  const del2 = new Delaunay(GX, GY, p2.qpts);

  const cpu2 = rasterizeGrid(GX, GY, del2.vtx, del2.getTriangles(), pal2);
  drawRGBA(document.getElementById('cCpu2'), GX, GY, cpu2);

  const gpu2 = new TriangleGPU(device, GX, GY);
  gpu2.setReference(grid);
  await gpu2.computeLoss(del2, pal2);
  drawRGB(document.getElementById('cGpu2'), GX, GY,
    await readbackTexture(device, gpu2._renderTarget, GX, GY));
  gpu2.destroy();

  gpu.destroy(); device.destroy();
}

document.getElementById('btn').addEventListener('click', () =>
  run(makeSyntheticImage(32, 32)).catch(e => print('ERROR: '+e.stack, false)));

document.getElementById('file').addEventListener('change', async e => {
  const f = e.target.files[0]; if (!f) return;
  run(await imageDataFromFile(f)).catch(e => print('ERROR: '+e.stack, false));
});
</script>
</body>
</html>
