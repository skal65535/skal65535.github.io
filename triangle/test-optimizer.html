<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Triangle Optimizer</title>
<link rel="stylesheet" href="../common/main.css">
<style>
  .opt-layout {
    display: grid;
    grid-template-columns: 255px 1fr;
    gap: 16px;
    margin-top: 14px;
    align-items: start;
  }
  @media (max-width: 768px) { .opt-layout { grid-template-columns: 1fr; } }

  .opt-panel { position: static; width: 100%; max-width: 100%; }

  .skal-row-text input[type=number] {
    font: inherit;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 3px 6px;
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    background: #fff;
    width: 100%;
    box-sizing: border-box;
  }

  /* Tabs */
  .tab-nav {
    display: flex;
    border-bottom: 1px solid var(--panel-border);
    padding: 6px 6px 0;
    gap: 2px;
  }
  .tab-btn {
    background: none;
    border: 1px solid transparent;
    border-bottom: 2px solid transparent;
    padding: 4px 9px 3px;
    font: inherit;
    font-size: 11px;
    cursor: pointer;
    color: var(--ink-dim);
    border-radius: 4px 4px 0 0;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--ink); background: rgba(0,0,0,0.04); }
  .tab-btn.active {
    color: var(--ink);
    border-color: var(--panel-border);
    border-bottom-color: #fff;
    background: #fff;
    font-weight: 600;
  }
  .tab-pane { display: none; padding: 8px 2px 4px; }
  .tab-pane.active { display: block; }
  .tab-pane .skal-row { margin-bottom: 10px; }
  .tab-pane .skal-row:last-child { margin-bottom: 4px; }
  .tab-pane .skal-row-slider input[type=range] { margin-top: 4px; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    padding: 5px 10px;
    margin-bottom: 8px;
    background: rgba(0,0,0,0.04);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-small);
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-dim);
  }
  .stats-bar b { color: var(--ink); font-weight: 600; }
  .stats-bar .sep { color: var(--panel-border); }
  #cmap { display: flex; flex-wrap: wrap; gap: 3px; }

  /* Action column (beside canvases) */
  .action-col {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 130px;
    flex-shrink: 0;
  }
  .action-col label.button,
  .action-col button.button { width: 100%; min-width: unset; box-sizing: border-box; }
  .action-col select {
    width: 100%;
    box-sizing: border-box;
    height: 38px;
    padding: 0 10px;
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    background: var(--btn-bg);
    color: var(--btn-fg);
    border: 2px solid var(--btn-border);
    border-radius: var(--radius-btn);
    cursor: pointer;
    appearance: auto;
  }
  .action-col select:hover { background: var(--btn-bg-hover); }

  /* Canvases */
  .cv-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-start; margin-bottom: 10px; }
  .cv { display: flex; flex-direction: column; align-items: center;
        gap: 4px; font-size: 12px; color: var(--ink-dim); }
  .cv canvas {
    border: 2px solid var(--canvas-border);
    border-radius: var(--radius-small);
    image-rendering: pixelated;
    background: var(--canvas-bg);
  }

  /* b64 + byte size */
  .b64-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .b64-row textarea {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 11px;
    resize: vertical;
    background: #fff;
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-small);
    padding: 5px 7px;
    color: var(--ink);
    min-height: 46px;
  }
  #byteSize {
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    font-family: var(--font-mono);
    white-space: nowrap;
  }

  /* Log */
  #log {
    font-family: var(--font-mono);
    font-size: 11px;
    max-height: 100px;
    overflow-y: auto;
    background: rgba(0,0,0,0.06);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-small);
    padding: 6px 8px;
    margin: 0;
    color: var(--ink-dim);
    white-space: pre-wrap;
    word-break: break-all;
  }

  #iters, #batchSize { width: auto; flex: 1; }
  #iters { flex: 1.5; }

</style>
</head>
<body>

<div id="main-area">
  <a id="skal-back" href="https://skal65535.github.io/">‹ Home</a>
  <h2>Triangle Optimizer</h2>

  <p class="blurb">
    Encode an image as a compact WebP2 triangle preview using a pure JS
    optimizer. Copy the output base64 string into the
    <a href="index.html">decoder</a> to render it.
  </p>

  <form>
    <input type="file" id="file" style="display:none" accept="image/*">
  </form>

  <div class="opt-layout">

    <!-- ── Left: tabbed parameter panel ──────────────────────────── -->
    <div class="skal-gui opt-panel">
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="grid">Grid</button>
        <button class="tab-btn" data-tab="optim">Optim</button>
        <button class="tab-btn" data-tab="lambda">λ</button>
        <button class="tab-btn" data-tab="mut">Mut</button>
        <button class="tab-btn" data-tab="disp">Disp</button>
      </div>
      <div class="skal-gui-body" style="padding-top:4px;">

        <!-- Grid tab -->
        <div class="tab-pane active" id="tab-grid">
          <div class="skal-row skal-row-slider">
            <div class="skal-row-header">
              <label class="skal-row-label" for="targetPts">Target points</label>
              <span class="skal-readout" id="targetPtsVal"></span>
            </div>
            <input type="range" id="targetPts" min="0" max="9" step="1" value="4">
          </div>
          <div class="skal-row">
            <span class="skal-readout" id="gridSize"></span>
          </div>
          <div class="skal-row skal-row-text">
            <label class="skal-row-label" for="nc">Colors</label>
            <input type="number" id="nc" value="6" min="2" max="32">
          </div>
          <div class="skal-row skal-row-text">
            <label class="skal-row-label" for="np">Init points %</label>
            <input type="number" id="np" value="30" min="0" max="100">
          </div>
          <div class="skal-row skal-row-toggle">
            <label class="skal-row-label" for="randomInit">Random init</label>
            <input type="checkbox" id="randomInit">
          </div>
          <div class="skal-row skal-row-text">
            <label class="skal-row-label" for="zoom">Zoom</label>
            <select id="zoom" style="font:inherit;font-size:12px;border:1px solid var(--panel-border);border-radius:4px;padding:2px 4px;">
              <option value="1">1×</option>
              <option value="2">2×</option>
              <option value="4">4×</option>
              <option value="8">8×</option>
            </select>
          </div>
        </div>

        <!-- Optim tab -->
        <div class="tab-pane" id="tab-optim">
          <div class="skal-row skal-row-text" style="gap:6px;">
            <label class="skal-row-label" for="iters">Iters</label>
            <input type="number" id="iters" value="100000" min="10">
            <label class="skal-row-label" for="batchSize">Batch</label>
            <input type="number" id="batchSize" value="20" min="1" max="10000">
          </div>
        </div>

        <!-- Lambda tab -->
        <div class="tab-pane" id="tab-lambda">
          <div class="skal-row skal-row-slider">
            <div class="skal-row-header">
              <label class="skal-row-label" for="lambda">λ</label>
              <span class="skal-readout" id="lambdaVal">1e-4</span>
            </div>
            <input type="range" id="lambda" min="-6" max="1" step="0.25" value="-4">
          </div>
          <div class="skal-row skal-row-toggle">
            <label class="skal-row-label" for="autoLambda">Auto-λ</label>
            <input type="checkbox" id="autoLambda" checked>
          </div>
          <div class="skal-row skal-row-text">
            <label class="skal-row-label" for="targetBytes">Target (bytes)</label>
            <input type="number" id="targetBytes" value="256" min="10">
          </div>
          <div class="skal-row skal-row-text">
            <label class="skal-row-label" for="autoGain">Auto-λ gain</label>
            <input type="number" id="autoGain" value="0.2" min="0.01" max="2" step="0.01">
          </div>
        </div>

        <!-- Mut tab -->
        <div class="tab-pane" id="tab-mut">
          <div class="skal-row skal-row-slider">
            <div class="skal-row-header">
              <label class="skal-row-label">Vtx move</label>
              <span class="skal-readout"><span id="v_vm">50</span>%</span>
            </div>
            <input class="prob" type="range" id="p_vm" min="0" max="100" value="50">
          </div>
          <div class="skal-row skal-row-slider">
            <div class="skal-row-header">
              <label class="skal-row-label">Vtx add</label>
              <span class="skal-readout"><span id="v_va">20</span>%</span>
            </div>
            <input class="prob" type="range" id="p_va" min="0" max="100" value="20">
          </div>
          <div class="skal-row skal-row-slider">
            <div class="skal-row-header">
              <label class="skal-row-label">Vtx remove</label>
              <span class="skal-readout"><span id="v_vs">25</span>%</span>
            </div>
            <input class="prob" type="range" id="p_vs" min="0" max="100" value="25">
          </div>
          <div class="skal-row skal-row-slider">
            <div class="skal-row-header">
              <label class="skal-row-label">Color index</label>
              <span class="skal-readout"><span id="v_ci">25</span>%</span>
            </div>
            <input class="prob" type="range" id="p_ci" min="0" max="100" value="25">
          </div>
          <div class="skal-row skal-row-slider">
            <div class="skal-row-header">
              <label class="skal-row-label">Color move</label>
              <span class="skal-readout"><span id="v_cm">20</span>%</span>
            </div>
            <input class="prob" type="range" id="p_cm" min="0" max="100" value="20">
          </div>
          <div class="skal-row skal-row-slider">
            <div class="skal-row-header">
              <label class="skal-row-label">Color add</label>
              <span class="skal-readout"><span id="v_ca">1</span>%</span>
            </div>
            <input class="prob" type="range" id="p_ca" min="0" max="100" value="1">
          </div>
          <div class="skal-row skal-row-slider">
            <div class="skal-row-header">
              <label class="skal-row-label">Color remove</label>
              <span class="skal-readout"><span id="v_cs">3</span>%</span>
            </div>
            <input class="prob" type="range" id="p_cs" min="0" max="100" value="3">
          </div>
        </div>

        <!-- Disp tab -->
        <div class="tab-pane" id="tab-disp">
          <div class="skal-row skal-row-toggle">
            <label class="skal-row-label" for="showTri">Show triangles</label>
            <input type="checkbox" id="showTri">
          </div>
          <div class="skal-row skal-row-text">
            <label class="skal-row-label" for="vmAmp">Vtx amplitude</label>
            <input type="number" id="vmAmp" value="1" min="1" max="32">
          </div>
          <div class="skal-row skal-row-text">
            <label class="skal-row-label" for="borderEscape">Border escape %</label>
            <input type="number" id="borderEscape" value="5" min="0" max="100">
          </div>
        </div>

      </div><!-- .skal-gui-body -->
    </div><!-- .skal-gui.opt-panel -->

    <!-- ── Right: work area ──────────────────────────────────────── -->
    <div>
      <!-- Stats bar: current state at a glance -->
      <div class="stats-bar">
        <span>pts: <b id="statPts">—</b></span>
        <span class="sep">|</span>
        <span>colors: <b id="statColors">—</b></span>
        <span class="sep">|</span>
        <span>dist: <b id="statDist">—</b></span>
        <span class="sep">|</span>
        <div id="cmap"></div>
      </div>

      <div class="cv-row">
        <div class="cv"><canvas id="cRef"></canvas><span>Reference</span></div>
        <div class="cv"><canvas id="cOpt"></canvas><span>Optimized</span></div>
        <div class="action-col">
          <select id="presetSelect">
            <option value="obama">Obama</option>
            <option value="shell">Shell logo</option>
            <option value="moon">Moon-Earth</option>
            <option value="claude">Claude Shannon</option>
          </select>
          <label class="button" for="file">Load image</label>
          <button class="button" id="resetBtn">Reset</button>
          <button class="button" id="btn">Run</button>
        </div>
      </div>
      <div class="b64-row">
        <button class="button" id="copyBtn" style="min-width:60px;height:38px;flex-shrink:0;">Copy</button>
        <textarea id="b64out" readonly rows="3"></textarea>
        <span id="byteSize"></span>
      </div>
      <pre id="log"></pre>
    </div>

  </div><!-- .opt-layout -->
</div><!-- #main-area -->

<script src="triangle-core.js"></script>
<script src="triangle-ans-enc.js"></script>
<script src="triangle-init.js"></script>
<script src="triangle-cpu.js"></script>
<script src="triangle-optimizer.js"></script>
<script>
'use strict';

const app = {
  TARGET_PTS: [500, 1000, 2000, 3000, 5000, 7000, 10000, 15000, 20000, 30000],
  PRESETS: {
    obama:  { file: 'obama.webp' },
    shell:  { file: 'shell-logo.webp' },
    moon:   { file: 'moon.webp' },
    claude: { file: 'claude.webp' },
  },

  ui: {},

  state: {
    optimizer: null,
    loadedImageData: null,
    loadedOrigCanvas: null,
    gridX: 64,
    gridY: 64,
    zoom: 1,
    lastRenderedPreview: null,
    lastRenderedColors: null,
  },

  init() {
    this.cacheDOMElements();
    this.initTabs();
    this.initEventListeners();
    this.updateTargetPtsDisplay();
    this.updateLambdaDisplay();
    this.ui.lambda.disabled = this.ui.autoLambda.checked;
    this.loadImageFromUrl(this.PRESETS[this.ui.presetSelect.value].file);
  },

  cacheDOMElements() {
    const ids = [
      'log', 'cRef', 'cOpt', 'b64out', 'cmap', 'showTri', 'lambda',
      'lambdaVal', 'autoLambda', 'copyBtn', 'presetSelect', 'file', 'resetBtn',
      'btn', 'targetPts', 'targetPtsVal', 'gridSize', 'zoom',
      'byteSize', 'statPts', 'statColors', 'statDist',
    ];
    ids.forEach(id => { this.ui[id] = document.getElementById(id); });
    this.ui.probInputs = document.querySelectorAll('.prob');
  },

  initTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });
  },

  initEventListeners() {
    this.ui.btn.addEventListener('click', () => this.toggleRun());
    this.ui.resetBtn.addEventListener('click', () => this.stopAndReset());
    this.ui.copyBtn.addEventListener('click', () => navigator.clipboard.writeText(this.ui.b64out.value));

    this.ui.presetSelect.addEventListener('change', e => this.loadImageFromUrl(this.PRESETS[e.target.value].file));
    this.ui.file.addEventListener('change', e => this.handleFileSelect(e));

    this.ui.targetPts.addEventListener('change', () => this.handleGridParamChange());
    this.ui.zoom.addEventListener('change', async e => {
      this.state.zoom = +e.target.value;
      if (this.state.loadedOrigCanvas) this.resampleFromOrig();
      await this.stopAndReset();
    });
    ['nc', 'np', 'randomInit'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => this.stopAndReset());
    });

    this.ui.lambda.addEventListener('input', () => this.updateLambdaDisplay());
    this.ui.autoLambda.addEventListener('change', e => { this.ui.lambda.disabled = e.target.checked; });
    this.ui.showTri.addEventListener('change', () => {
      if (this.state.lastRenderedPreview) {
        this.renderPreview(this.ui.cOpt, this.state.lastRenderedPreview, this.state.lastRenderedColors);
      }
    });

    this.ui.probInputs.forEach(el => {
      const span = document.getElementById('v_' + el.id.slice(2));
      el.addEventListener('input', () => { span.textContent = el.value; });
      span.textContent = el.value;
    });
  },

  getParams() {
    const g = id => +document.getElementById(id).value;
    const optimizerParams = {
      proba_vertex_move:      g('p_vm'),
      proba_vertex_add:       g('p_va'),
      proba_vertex_sub:       g('p_vs'),
      proba_color_index_move: g('p_ci'),
      proba_color_move:       g('p_cm'),
      proba_color_add:        g('p_ca'),
      proba_color_sub:        g('p_cs'),
      vertex_amplitude:       g('vmAmp') || 1,
      border_escape_prob:     g('borderEscape'),
    };
    if (!this.ui.autoLambda.checked) optimizerParams.lambda = this.getLambda();

    return {
      nc: g('nc'),
      np: g('np'),
      maxIter: g('iters') || 100000,
      batchSize: g('batchSize') || 20,
      targetBytes: g('targetBytes') || 500,
      autoGain: g('autoGain') || 0.2,
      randomInit: document.getElementById('randomInit').checked,
      optimizer: optimizerParams,
    };
  },

  getLambda() { return Math.pow(10, +this.ui.lambda.value); },
  setLambda(v) {
    const log = Math.max(-7, Math.min(1, Math.log10(v)));
    this.ui.lambda.value = log;
    const val = Math.pow(10, log);
    this.ui.lambdaVal.textContent = val.toExponential(2);
    return val;
  },

  toggleRun() {
    if (this.state.optimizer) {
      this.state.optimizer.stop();
    } else {
      this.run();
    }
  },

  async run() {
    if (this.state.optimizer) return;
    this.ui.btn.textContent = 'Stop';
    this.log('');
    this.updateStatus('');

    try {
      const params = this.getParams();
      const { zGrid, preview, color_data } = this.prepareGrid(params);
      this.log(`Initial: nb_pts=${preview.nb_pts} nb_colors=${preview.nb_colors} size=${encodeSize(preview,color_data)}B`);

      const opt = new TriangleOptimizer(preview, color_data, {
        refGrid: zGrid,
        zoom: this.state.zoom,
        batch_size: params.batchSize,
        ...params.optimizer,
      });
      this.state.optimizer = opt;

      const initScore = opt.init();
      this.log(`Initial score: ${initScore.toFixed(6)} (lambda=${opt.lambda.toExponential(0)})`);

      const t0 = performance.now();
      const result = await opt.run(params.maxIter, (iter, best, r) => {
        Object.assign(opt, this.getParams().optimizer);
        const elapsedS = (performance.now() - t0) / 1000;
        const evPerSec = elapsedS > 0 ? Math.round(iter / elapsedS).toLocaleString() : '—';

        const sz = encodeSize(opt.preview, opt.color_data);
        if (this.ui.autoLambda.checked) {
          const p = this.getParams();
          opt.lambda = this.setLambda(opt.lambda * Math.pow(sz / p.targetBytes, p.autoGain));
        }
        const dist = r.distortion ?? (r.score - opt.lambda * sz);
        this.ui.statDist.textContent = dist.toFixed(5);
        this.log(`[${iter}] best=${best.toFixed(5)} dist=${dist.toFixed(5)} size=${sz}B λ=${opt.lambda.toExponential(2)} ${elapsedS.toFixed(1)}s ${evPerSec}ev/s acc=${r.accepted?'Y':'N'}`);
        this.renderPreview(this.ui.cOpt, opt.bestPreview, opt.bestColorData);
      });

      const elapsed = ((performance.now()-t0)/1000).toFixed(2);
      this.log(`Done ${elapsed}s (${Math.round(params.maxIter/elapsed)} iter/s)`);
      this.log(`Final: nb_pts=${result.preview.nb_pts} nb_colors=${result.preview.nb_colors} size=${encodeSize(result.preview,result.color_data)}B loss=${result.loss.toFixed(6)}`);
      this.updateStatus(`Done — best loss=${result.loss.toFixed(6)}`);
      this.renderPreview(this.ui.cOpt, result.preview, result.color_data);

    } catch (err) {
      this.log(`\n--- ERROR ---\n${err.message}`);
      this.updateStatus('Error!');
      console.error(err);
    } finally {
      this.state.optimizer = null;
      this.ui.btn.textContent = 'Run';
    }
  },

  async reset() {
    this.log('');
    this.updateStatus('');
    const params = this.getParams();
    const { preview, color_data } = this.prepareGrid(params);
    this.log(`Reset: nb_pts=${preview.nb_pts} nb_colors=${preview.nb_colors} size=${encodeSize(preview,color_data)}B has_alpha=${preview.has_alpha}`);
    this.renderPreview(this.ui.cOpt, preview, color_data);
  },

  async stopAndReset() {
    if (this.state.optimizer) this.state.optimizer.stop();
    await this.reset();
  },

  async loadImageFromUrl(url) {
    this.updateStatus(`Loading ${url}...`);
    try {
      const img = new Image();
      img.src = url;
      await img.decode();
      this.state.loadedOrigCanvas = document.createElement('canvas');
      this.state.loadedOrigCanvas.width = img.naturalWidth;
      this.state.loadedOrigCanvas.height = img.naturalHeight;
      this.state.loadedOrigCanvas.getContext('2d').drawImage(img, 0, 0);
      this.updateGridFromImage(img.naturalWidth, img.naturalHeight);
      this.resampleFromOrig();
      await this.stopAndReset();
    } catch (err) {
      this.log(`Error loading image: ${url}`);
      this.updateStatus('Error!');
      console.error(err);
    }
  },

  async handleFileSelect(e) {
    const f = e.target.files[0];
    if (!f) return;
    this.updateStatus(`Loading ${f.name}...`);
    try {
      const img = new Image();
      const url = URL.createObjectURL(f);
      img.onload = async () => {
        this.state.loadedOrigCanvas = document.createElement('canvas');
        this.state.loadedOrigCanvas.width = img.naturalWidth;
        this.state.loadedOrigCanvas.height = img.naturalHeight;
        this.state.loadedOrigCanvas.getContext('2d').drawImage(img, 0, 0);
        this.updateGridFromImage(img.naturalWidth, img.naturalHeight);
        this.resampleFromOrig();
        URL.revokeObjectURL(url);
        await this.stopAndReset();
      };
      img.src = url;
    } catch (err) {
      this.log(`Error loading file: ${f.name}`);
      this.updateStatus('Error!');
      console.error(err);
    }
  },

  handleGridParamChange() {
    if (this.state.loadedOrigCanvas) {
      this.updateGridFromImage(this.state.loadedOrigCanvas.width, this.state.loadedOrigCanvas.height);
    } else {
      this.updateGridFromImage(1, 1);
    }
    this.resampleFromOrig();
    this.stopAndReset();
  },

  updateGridFromImage(imgW, imgH) {
    const targetPts = this.TARGET_PTS[+this.ui.targetPts.value];
    const ar = imgW / imgH;
    this.state.gridX = Math.max(4, Math.round(Math.sqrt(targetPts * ar)));
    this.state.gridY = Math.max(4, Math.round(Math.sqrt(targetPts / ar)));
    this.ui.gridSize.textContent = `${this.state.gridX}×${this.state.gridY} (${this.state.gridX * this.state.gridY} pts)`;
    this.setCanvasDisplaySize(this.ui.cRef, this.state.gridX, this.state.gridY);
    this.setCanvasDisplaySize(this.ui.cOpt, this.state.gridX, this.state.gridY);
    this.updateTargetPtsDisplay();
  },

  resampleFromOrig() {
    if (!this.state.loadedOrigCanvas) return;
    const { gridX, gridY, zoom } = this.state;
    const cv = document.createElement('canvas');
    cv.width = gridX * zoom; cv.height = gridY * zoom;
    cv.getContext('2d').drawImage(this.state.loadedOrigCanvas, 0, 0, gridX * zoom, gridY * zoom);
    this.state.loadedImageData = cv.getContext('2d').getImageData(0, 0, gridX * zoom, gridY * zoom);
  },

  prepareGrid(params) {
    const { gridX, gridY, zoom } = this.state;
    const np = Math.min(Math.round(gridX * gridY * params.np / 100), kPreviewMaxNumVertices);
    const imgData = this.state.loadedImageData || this.makeSyntheticImage(gridX * zoom, gridY * zoom);
    const zGrid = sampleGrid(imgData, gridX * zoom, gridY * zoom);
    const { preview, color_data } = buildInitialState(imgData,
        { grid_x: gridX, grid_y: gridY, nb_colors: params.nc, nb_pts: np, random_init: params.randomInit });
    this.drawRGBA(this.ui.cRef, gridX * zoom, gridY * zoom, zGrid);
    return { zGrid, preview, color_data };
  },

  makeSyntheticImage(w, h) {
    const data = new Uint8ClampedArray(w * h * 4);
    for (let y = 0; y < h; ++y) for (let x = 0; x < w; ++x) {
      const i = (y * w + x) * 4;
      data[i]   = Math.round(x / (w - 1) * 255);
      data[i+1] = Math.round(y / (h - 1) * 255);
      data[i+2] = Math.round((1 - x / (w - 1)) * 128 + 64);
      data[i+3] = 255;
    }
    return { data, width: w, height: h };
  },

  log(s) { this.ui.log.textContent += s + '\n'; this.ui.log.scrollTop = this.ui.log.scrollHeight; },
  updateStatus(s) { if (s) this.log(s); },
  updateLambdaDisplay() { this.ui.lambdaVal.textContent = this.getLambda().toExponential(0); },
  updateTargetPtsDisplay() { this.ui.targetPtsVal.textContent = this.TARGET_PTS[+this.ui.targetPts.value]; },

  drawRGBA(canvas, w, h, rgbaF32) {
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    const id = ctx.createImageData(w, h);
    id.data.set(new Uint8ClampedArray(rgbaF32));
    ctx.putImageData(id, 0, 0);
  },

  renderPreview(canvas, preview, color_data) {
    const { zoom } = this.state;
    const zx = preview.grid_x * zoom, zy = preview.grid_y * zoom;
    const del = buildDel(preview);
    const pal = buildPalRGB(color_data);
    const scaledVtx = zoom > 1 ? del.vtx.map(v => ({ x: v.x * zoom, y: v.y * zoom, idx: v.idx })) : del.vtx;
    const rgba = rasterizeGrid(zx, zy, scaledVtx, del.getTriangles(), pal);
    this.drawRGBA(canvas, zx, zy, rgba);
    this.overlayTriangles(canvas, del, zoom);
    this.renderColormap(color_data);
    const b64 = encodePreview(preview, color_data);
    this.ui.b64out.value = b64;
    const sz = encodeSize(preview, color_data);
    this.ui.byteSize.textContent = sz + ' B';
    this.ui.statPts.textContent = preview.nb_pts;
    this.ui.statColors.textContent = preview.nb_colors;
    this.state.lastRenderedPreview = preview;
    this.state.lastRenderedColors = color_data;
  },

  renderColormap(color_data) {
    this.ui.cmap.innerHTML = '';
    for (const c of color_data) {
      const rgb = YCoCg_to_RGB(c.y, c.co, c.cg, c.a);
      const div = document.createElement('div');
      div.style.cssText = `width:14px;height:14px;background:rgba(${rgb.r},${rgb.g},${rgb.b},${rgb.a/255});` +
                          `border:1px solid var(--panel-border);border-radius:2px;display:inline-block;`;
      div.title = `Y=${c.y} Co=${c.co} Cg=${c.cg} a=${c.a} | R=${rgb.r} G=${rgb.g} B=${rgb.b} A=${rgb.a}`;
      this.ui.cmap.appendChild(div);
    }
  },

  overlayTriangles(canvas, del, zoom) {
    if (!this.ui.showTri.checked) return;
    const ctx = canvas.getContext('2d');
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 0.5;
    for (const t of del.getTriangles()) {
      const [v0, v1, v2] = [del.vtx[t.vtx[0]], del.vtx[t.vtx[1]], del.vtx[t.vtx[2]]];
      ctx.beginPath();
      ctx.moveTo(v0.x * zoom + 0.5, v0.y * zoom + 0.5);
      ctx.lineTo(v1.x * zoom + 0.5, v1.y * zoom + 0.5);
      ctx.lineTo(v2.x * zoom + 0.5, v2.y * zoom + 0.5);
      ctx.closePath();
      ctx.stroke();
    }
  },

  setCanvasDisplaySize(canvas, gx, gy) {
    const maxDim = 256;
    if (gx >= gy) {
      canvas.style.width = maxDim + 'px';
      canvas.style.height = Math.round(maxDim * gy / gx) + 'px';
    } else {
      canvas.style.height = maxDim + 'px';
      canvas.style.width = Math.round(maxDim * gx / gy) + 'px';
    }
  },
};

window.addEventListener('DOMContentLoaded', () => app.init());
</script>
