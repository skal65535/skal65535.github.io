<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Show me the deltas!</title>
<link rel="stylesheet" href="../common/main.css">
<style>
  #delta-canvas, #H1-canvas, #H2-canvas {
    border: 2px solid var(--canvas-border);
    border-radius: 12px;
    background: var(--canvas-bg);
    box-shadow: 0 0 5px rgba(0,0,0,0.35);
  }
  #grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    max-width: 100%;
    justify-items: center;
  }
  #grid canvas { max-width: 100%; height: auto; }
</style>
</head>

<body>

<div id="main-area">
  <a id="skal-back" href="https://skal65535.github.io/">‹ Home</a>
  <h2>Show me the deltas!</h2>
  <p>This is a small tool for showing the image's delta.</p>
  <p class="blurb small">Drag and drop image on the canvas below.</p>

  <form class="my-form">
    <input type="file" id="FileElmt" style="display:none"
           multiple accept="image/*">
  </form>

  <div class="button-row">
    <label class="button" for="FileElmt">select an image</label>
  </div>

  <canvas id="input-image" width="256" height="400" style="display:none"></canvas>

  <div id="grid">
    <canvas id="main-canvas"  width="512" height="400"></canvas>
    <canvas id="delta-canvas" width="512" height="400"></canvas>
    <canvas id="H1-canvas"    width="256" height="200"></canvas>
    <canvas id="H2-canvas"    width="256" height="200"></canvas>
  </div>
</div>

<script type="module">
"use strict";

import { onFileDrop, loadImageFile } from '../common/utils.js';

const params = {  // Global parameters
  original: null,
  image: null,
  delta: null,
}

async function HandleFile(file) {
  if (!file) return;
  try {
    params.original = await loadImageFile(file);
    Render();
  } catch (e) { console.error(e); }
}

function main() {
  params.original = new Image();
  params.original.src = "./mona.webp";
  params.original.onload = function() { Render(); };

  onFileDrop(document.getElementById('main-area'), HandleFile);
  document.getElementById('FileElmt').addEventListener('change',
    e => HandleFile(e.target.files[0]));
}

function Render() {
  const image = params.original;
  const canvas = document.querySelector("#input-image");
  let Wo = canvas.width, Ho = canvas.height;
  let W = image.width, H = image.height;
  if (W > Wo || H > Ho) {   // needs resizing?
    if (W * Ho > Wo * H) {
      H = Math.floor(H * Wo / W);
      W = Wo;
    } else {
      W = Math.floor(W * Ho / H);
      H = Ho;
    }
  }
  image.width = W;
  image.height = H;
  canvas.width = W;
  canvas.height = H;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(image, 0, 0, W, H);

  ShowDelta();
}

function ShowDelta() {
  const input = document.querySelector("#input-image");
  const input_ctx = input.getContext("2d");
  let Wo = input.width, Ho = input.height;

  const canvas1 = document.querySelector("#main-canvas");
  const ctx1 = canvas1.getContext("2d");
  const canvas2 = document.querySelector("#delta-canvas");
  const ctx2 = canvas2.getContext("2d");
  if (!ctx1 || !ctx2) return;

  canvas1.width = Wo;
  canvas1.height = Ho;
  canvas2.width = Wo;
  canvas2.height = Ho;

  const pixels = input_ctx.getImageData(0, 0, Wo, Ho);
  const d = pixels.data;
  const pixels1 = ctx1.getImageData(0, 0, Wo, Ho);
  const d1 = pixels1.data;
  const pixels2 = ctx2.getImageData(0, 0, Wo, Ho);
  const d2 = pixels2.data;

  const H1 = new Array(256), H2 = new Array(256)
  H1.fill(0);
  H2.fill(0);
  const stride = 4 * Wo;
  for (let y = 0; y < Ho; ++y) {
    for (let x = 0; x < Wo; ++x) {
      const off0 = y * stride + x * 4;
      const r = d[off0 + 0], g = d[off0 + 1], b = d[off0 + 2];
      const gray = Math.floor(r * 0.2126 + g * 0.7152 + b * 0.0722);
      d1[off0 + 0] = gray;
      d1[off0 + 1] = gray;
      d1[off0 + 2] = gray;
      d1[off0 + 3] = 255;
      H1[gray] += 1;
      let A = (x > 0) ? d1[off0 - 4] : 128;
      let B = (y > 0) ? d1[off0 - stride] : 128;
      let C = (x > 0 && y > 0) ? d1[off0 - stride - 4] : 128;
      function Swap([A, B]) { return (A < B) ? [A, B] : [B, A]; }
      [A, B] = Swap([A, B]);
      [B, C] = Swap([B, C]);
      [A, B] = Swap([A, B]);
      // -> A <= B <= C.   'B' is the median-of-3
      const delta = Math.max(0, Math.min((gray - B) + 128, 255));
      d2[off0 + 0] = delta;
      d2[off0 + 1] = delta;
      d2[off0 + 2] = delta;
      d2[off0 + 3] = 255;
      H2[delta] += 1;
    }
  }
  ctx1.putImageData(pixels1, 0, 0);
  ctx2.putImageData(pixels2, 0, 0);
  DrawHisto(document.querySelector("#H1-canvas"), H1);
  DrawHisto(document.querySelector("#H2-canvas"), H2);
}

function DrawHisto(canvas, H) {
  const ctx = canvas.getContext("2d");
  const Wo = canvas.width, Ho = canvas.height;
  const max = Math.max(...H);

  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, Wo, Ho);

  ctx.fillStyle = 'black';
  for (let i = 0; i < 256; ++i) {
    const h = (max - H[i]) * (Ho - 1) / max;
    ctx.fillRect(i * Wo / 256, h, 2, Ho - 1);
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', main);
} else {
  main();
}
</script>

</body>
</html>
