<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Life</title>
<link rel="stylesheet" href="../common/main.css">
<style>
  #main-canvas {
    width: 100%;
    height: auto;
    background: var(--canvas-bg);
  }
</style>
</head>

<body>

<div id="main-area">
  <a id="skal-back" href="https://skal65535.github.io/">‹ Home</a>
  <h2>Particle Life</h2>
  <p class="blurb small">
    Per-color attraction/repulsion rules drive emergent behaviors. Click on the
    canvas to send a pulse. Keys: <kbd>r</kbd> random rules, <kbd>o</kbd> reset,
    <kbd>s</kbd> symmetric rules.
  </p>

  <div class="canvas-wrap">
    <!-- 'tabindex' is a trick to make the canvas capture key events -->
    <canvas id="main-canvas" tabindex="1"></canvas>
    <div id="gui-container"></div>
  </div>
</div>

<script type="module">
"use strict";

import { mkGui }    from '../common/controls.js';
import { canvasXY } from '../common/touch.js';
import { makeRng, drawCircle, makeFPS } from '../common/utils.js';

const maxRadius = 200;
const predefinedColors = ['green', 'red', 'orange', 'cyan', 'magenta', 'lavender', 'teal'];
const settings = {
    seed: 91651088029,
    fps: 0,
    atoms: { count: 500, radius: 1 },
    drawings: {
        lines: false,
        circle: false,
        background_color: '#000000',
    },
    export: {
        image: () => {
            const imageDataURL = canvas.toDataURL({ format: 'png', quality: 1 });
            dataURL_downloader(imageDataURL);
        },
        video: () => {
            mediaRecorder.state == 'recording' ? mediaRecorder.stop() : mediaRecorder.start();
        },
    },
    explore: false,
    explorePeriod: 100,
    rules: {},
    rulesArray: [],
    radii: {},
    radii2Array: [],
    colors: [],
    numColors: 4,
    time_scale: 1.0,
    viscosity: 0.7,
    pulseDuration: 10,
    wallRepel: 40,
    reset: () => { randomAtoms(settings.atoms.count, true) },
    randomRules: () => { settings.seed = rng.seed; startRandom() },
    symmetricRules: () => {
        symmetricRules();
        randomAtoms(settings.atoms.count, true);
        updateGUIDisplay();
    },
}

Object.defineProperty(String.prototype, 'capitalise', {
    value: function() { return this.charAt(0).toUpperCase() + this.slice(1); },
    enumerable: false
})

// Build GUI. Re-rebuilds when the number of colors changes (the per-color
// folders are regenerated from settings.colors each time).
function updateGUIDisplay() {
    const container = document.getElementById('gui-container');
    container.innerHTML = '';   // drop the old panel before rebuilding
    setupGUI();
}
function setupGUI() {
    const gui = mkGui(document.getElementById('gui-container'), { title: 'Parameters' });
    const cfg = gui.addFolder('Config');
    cfg.add(settings, 'reset').name('Reset');
    cfg.add(settings, 'randomRules').name('Random Rules');
    cfg.add(settings, 'symmetricRules').name('Symmetric Rules');
    cfg.add(settings, 'numColors', 1, 7, 1).name('Number of Colors').listen().onChange(() => {
        setNumberOfColors(); startRandom();
    });
    cfg.add(settings, 'fps').name('FPS').listen().disable();
    cfg.add(settings.atoms, 'count', 1, 1000, 1).name('Atoms per-color').listen().onChange(v => {
        randomAtoms(v, true);
    });
    cfg.add(settings, 'time_scale', 0.1, 5, 0.01).name('Time Scale').listen();
    cfg.add(settings, 'viscosity', 0.1, 2, 0.1).name('Viscosity').listen();
    cfg.add(settings, 'pulseDuration', 1, 100, 1).name('Click Pulse Duration').listen();
    cfg.add(settings, 'wallRepel', 0, 100, 1).name('Wall Repel').listen();
    cfg.add(settings, 'explore').name('Random Exploration').listen();

    const dr = gui.addFolder('Drawings');
    dr.add(settings.atoms, 'radius', 1, 10, 0.5).name('Radius').listen();
    dr.add(settings.drawings, 'circle').name('Circle Shape').listen();
    dr.add(settings.drawings, 'lines').name('Draw Lines').listen();
    dr.addColor(settings.drawings, 'background_color').name('Background').listen();

    const exp = gui.addFolder('Export', { collapsed: true });
    exp.add(settings.export, 'image').name('Image');
    exp.add(settings.export, 'video').name('Video: Start / stop');

    for (const atomColor of settings.colors) {
        const colorFolder = gui.addFolder(`Rules: ${atomColor.capitalise()}`, { collapsed: true });
        for (const ruleColor of settings.colors) {
            colorFolder.add(settings.rules[atomColor], ruleColor, -1, 1, 0.001)
                .name(`-> ${ruleColor.capitalise()}`)
                .listen().onChange(() => flattenRules());
        }
        colorFolder.add(settings.radii, atomColor, 1, maxRadius, 5).name('Radius')
            .listen().onChange(() => flattenRules());
    }
}

// Mutable seed lives on rng.seed (also re-read by `settings.randomRules`
// to round-trip through the URL hash).
const rng = makeRng(settings.seed);
const mulberry32 = () => rng.next01();

function loadSeedFromUrl() {
    let hash = window.location.hash;
    if (hash != undefined && hash[0] == '#') {
        let param = Number(hash.substr(1));
        if (isFinite(param)) {
            settings.seed = param;
            console.log("Using seed " + settings.seed);
        }
    }
}

function randomRules() {
    if (!isFinite(settings.seed)) settings.seed = 0xcafecafe;
    window.location.hash = "#" + settings.seed;
    rng.seed = settings.seed;
    for (const i of settings.colors) {
        settings.rules[i] = {};
        for (const j of settings.colors) {
            settings.rules[i][j] = mulberry32() * 2 - 1;
        }
        settings.radii[i] = 80;
    }
    flattenRules();
}

function symmetricRules() {
    for (const i of settings.colors) {
        for (const j of settings.colors) {
            if (j < i) {
                let v = 0.5 * (settings.rules[i][j] + settings.rules[j][i]);
                settings.rules[i][j] = settings.rules[j][i] = v;
            }
        }
    }
    flattenRules();
}

function flattenRules() {
    settings.rulesArray = [];
    settings.radii2Array = [];
    for (const c1 of settings.colors) {
        for (const c2 of settings.colors) {
            settings.rulesArray.push(settings.rules[c1][c2]);
        }
        settings.radii2Array.push(settings.radii[c1] * settings.radii[c1]);
    }
}

function updateCanvasDimensions() {
    const wrap = canvas.parentElement;
    const isMobile = window.innerWidth <= 768;
    const w = Math.max(320, Math.floor(wrap.clientWidth));
    const h = isMobile ? Math.floor(w) : Math.max(400, Math.floor(w * 0.6));
    if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
    }
}

function randomX() { return mulberry32() * (canvas.width - 100) + 50; }
function randomY() { return mulberry32() * (canvas.height - 100) + 50; }

const create = (number, color) => {
    for (let i = 0; i < number; i++) {
        atoms.push([randomX(), randomY(), 0, 0, color]);
    }
};

function randomAtoms(number_of_atoms_per_color, clear_previous) {
    if (clear_previous) atoms.length = 0;
    for (let c = 0; c < settings.colors.length; c++) {
        create(number_of_atoms_per_color, c);
    }
}

function startRandom() {
    randomRules();
    randomAtoms(settings.atoms.count, true);
    updateGUIDisplay();
}

function setNumberOfColors() {
    settings.colors = [];
    for (let i = 0; i < settings.numColors; ++i) {
        settings.colors.push(predefinedColors[i]);
    }
}

// Run Application
loadSeedFromUrl();

// Canvas
const canvas = document.getElementById('main-canvas');
const m = canvas.getContext("2d");

const drawSquare = (x, y, color, radius) => {
    m.fillStyle = color;
    m.fillRect(x - radius, y - radius, 2 * radius, 2 * radius);
}
function drawLineBetweenAtoms(ax, ay, bx, by, color) {
    m.beginPath();
    m.moveTo(ax, ay);
    m.lineTo(bx, by);
    m.closePath();
    m.strokeStyle = color;
    m.stroke();
};

updateCanvasDimensions();
window.addEventListener('resize', updateCanvasDimensions);

// Click sends a pulse. canvasXY accounts for CSS scaling on mobile.
var pulse = 0;
var pulse_x = 0, pulse_y = 0;
canvas.addEventListener('pointerdown', ev => {
    const [x, y] = canvasXY(canvas, ev);
    pulse = settings.pulseDuration;
    pulse_x = x;
    pulse_y = y;
});
canvas.addEventListener('keydown', ev => {
    switch (ev.key) {
        case 'r': settings.randomRules();    break;
        case 'o': settings.reset();          break;
        case 's': settings.symmetricRules(); break;
    }
});

var exploration_timer = 0;
function exploreParameters() {
    if (exploration_timer <= 0) {
        let c1 = settings.colors[Math.floor(mulberry32() * settings.numColors)];
        if (mulberry32() >= 0.2) {
            let c2 = settings.colors[Math.floor(mulberry32() * settings.numColors)];
            let new_strength = mulberry32();
            if (settings.rules[c1][c2] > 0) new_strength = -new_strength;
            settings.rules[c1][c2] = new_strength;
        } else {
            settings.radii[c1] = 1 + Math.floor(mulberry32() * maxRadius);
        }
        flattenRules();
        exploration_timer = settings.explorePeriod;
    }
    exploration_timer -= 1;
}

var total_v;

const applyRules = () => {
    total_v = 0.;
    for (const a of atoms) {
        let fx = 0;
        let fy = 0;
        const idx = a[4] * settings.numColors;
        const r2 = settings.radii2Array[a[4]]
        for (const b of atoms) {
            const g = settings.rulesArray[idx + b[4]];
            const dx = a[0] - b[0];
            const dy = a[1] - b[1];
            if (dx !== 0 || dy !== 0) {
                const d = dx * dx + dy * dy;
                if (d < r2) {
                    const F = g / Math.sqrt(d);
                    fx += F * dx;
                    fy += F * dy;
                    if (settings.drawings.lines) {
                        drawLineBetweenAtoms(a[0], a[1], b[0], b[1], settings.colors[b[4]]);
                    }
                }
            }
        }
        if (pulse != 0) {
            const dx = a[0] - pulse_x;
            const dy = a[1] - pulse_y;
            const d = dx * dx + dy * dy;
            if (d > 0) {
                const F = 100. * pulse / (d * settings.time_scale);
                fx += F * dx;
                fy += F * dy;
            }
        }
        if (settings.wallRepel > 0) {
            const d = settings.wallRepel;
            const strength = 0.1;
            if (a[0] <                d) fx += (d -                a[0]) * strength;
            if (a[0] > canvas.width - d) fx += (canvas.width - d - a[0]) * strength;
            if (a[1] <                 d) fy += (d                 - a[1]) * strength;
            if (a[1] > canvas.height - d) fy += (canvas.height - d - a[1]) * strength;
        }
        const vmix = (1. - settings.viscosity);
        a[2] = a[2] * vmix + fx * settings.time_scale;
        a[3] = a[3] * vmix + fy * settings.time_scale;
        total_v += Math.abs(a[2]);
        total_v += Math.abs(a[3]);
    }
    for (const a of atoms) {
        a[0] += a[2];
        a[1] += a[3];
        if (a[0] < 0)              { a[0] = -a[0];                       a[2] *= -1; }
        if (a[0] >= canvas.width)  { a[0] = 2 * canvas.width  - a[0];    a[2] *= -1; }
        if (a[1] < 0)              { a[1] = -a[1];                       a[3] *= -1; }
        if (a[1] >= canvas.height) { a[1] = 2 * canvas.height - a[1];    a[3] *= -1; }
    }
    total_v /= atoms.length;
};

// Generate Rules
setNumberOfColors();
randomRules();

// Generate Atoms
const atoms = [];
randomAtoms(settings.atoms.count, true);

setupGUI();

const fps = makeFPS();

function update() {
    updateCanvasDimensions();
    m.fillStyle = settings.drawings.background_color;
    m.fillRect(0, 0, canvas.width, canvas.height);
    applyRules();
    for (const a of atoms) {
        if (settings.drawings.circle) {
            drawCircle(m, a[0], a[1], settings.colors[a[4]], settings.atoms.radius, true);
        } else {
            drawSquare(a[0], a[1], settings.colors[a[4]], settings.atoms.radius);
        }
    }
    updateParams();
    requestAnimationFrame(update);
};

function updateParams() {
    settings.fps = fps.tick();
    if (total_v > 30. && settings.time_scale > 5.) settings.time_scale /= 1.1;
    if (settings.time_scale < 0.9) settings.time_scale *= 1.01;
    if (settings.time_scale > 1.1) settings.time_scale /= 1.01;

    if (pulse > 0) pulse -= 1;
    if (settings.explore) exploreParameters();
}

update();

// Download DataURL
function dataURL_downloader(dataURL, name = `particle_life_${settings.seed}`) {
    const hyperlink = document.createElement("a");
    hyperlink.download = name;
    hyperlink.target = '_blank';
    hyperlink.href = dataURL;
    hyperlink.click();
    hyperlink.remove();
};

// Record a video
const videoStream = canvas.captureStream();
const mediaRecorder = new MediaRecorder(videoStream);
let chunks = [];
mediaRecorder.ondataavailable = function (e) { chunks.push(e.data); };
mediaRecorder.onstop = function (e) {
    const blob = new Blob(chunks, { 'type': 'video/mp4' });
    const videoDataURL = URL.createObjectURL(blob);
    dataURL_downloader(videoDataURL);
    chunks = [];
};
</script>

</body>
</html>
