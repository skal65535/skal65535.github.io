<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kruskal and Min-Spanning Tree</title>
<link rel="stylesheet" href="../common/main.css">
<style>
  #main-canvas { width: 100%; height: auto; }
</style>
</head>

<body>

<div id="main-area">
  <a id="skal-back" href="https://skal65535.github.io/" data-year="2022"></a>

  <h2>Minimum Spanning Tree (Kruskal's algorithm)</h2>
  <p class="blurb">
    Kruskal's algorithm finds a minimum-cost spanning tree on a fully-connected
    point graph. With "Shortest Paths" on, the closest point to the cursor seeds
    a Dijkstra-style nearest-paths tree.
    Click on the canvas to add a point; press <kbd>space</kbd> to reshuffle.
  </p>

  <div class="canvas-wrap">
    <!-- 'tabindex' is a trick to make the canvas capture key events -->
    <canvas id="main-canvas" width="1000" height="700" tabindex="1"></canvas>
    <div id="gui-container"></div>
  </div>
</div>

<script type="module">
"use strict";

import { mkGui }    from '../common/controls.js';
import { canvasXY } from '../common/touch.js';
import { makeRng, drawCircle, drawLine, makeFPS } from '../common/utils.js';

function Norm2(dx, dy) { return dx * dx + dy * dy; }
class Point {
    constructor(x, y) { this.x = x; this.y = y; }
    Distance2(p) { return Norm2(p.x - this.x, p.y - this.y); }
}
class Link {
    constructor(i, j, key) { this.i = i; this.j = j; this.key = key; }
}

// Kruskal's algorithm for Minimum Spanning Tree.
//  https://en.wikipedia.org/wiki/Kruskal%27s_algorithm
function findSet(F, p) {
     let P = p;
     while (F[p] != p) p = F[p];
     while (F[P] != P) { const tmp = F[P]; F[P] = p; P = tmp; }
     return p;
}
function findMSTKruskal(edges, pts) {
    edges.sort((a, b) => { return (b.key - a.key); });
    let F = [];
    for (let i = 0; i < pts.length; ++i) F.push(i);
    let links = [];
    while (edges.length > 0) {
        const p = edges.pop();
        const Ri = findSet(F, p.i), Rj = findSet(F, p.j);
        if (Ri != Rj) {
            links.push(p);
            F[Rj] = Ri;
        }
    }
    return links;
}

// Shortest path algo
function findNearest(pts, pos) {
  let best_d = 1e8, best = -1;
  for (let i = 0; i < pts.length; ++i) {
      const d = pts[i].Distance2(pos);
      if (d < best_d) {
          best_d = d;
          best = i;
      }
  }
  return best;
}
function fillSPTree(pts, start) {
    let tree = [];
    for (let i = 0; i < pts.length; ++i) tree.push([i, false, 0., 0]);

    let todo = [start];
    while (todo.length > 0) {
        const cur = todo.pop();
        for (let j = 0; j < tree.length; ++j) {
            if (j == cur) continue;
            const key = tree[cur][2] + points[cur].Distance2(points[j]);
            if (tree[j][1] == false) {
                todo.push(j);
                tree[j]= [cur, true, key, 0];
            } else if (key < tree[j][2]) {
                tree[j] = [cur, true, key, tree[cur][3] + 1];
            }
        }
    }
    return tree;
}

// Global parameters
const settings = {
    count: 500,
    ctype: 2,
    jitter: 100.,
    rotate: true,
    MST: true,
    SPT: false,
    radius: 1.,
    background_color: '#0a1230',
    fps: 0,
    reset: () => { randomPoints(); },
}

const rng = makeRng();
const mulberry32 = () => rng.nextSigned();

const randomPoints = () => {
    points.length = 0;
    const number_of_points = settings.count;
    const type = settings.ctype;
    const mx = canvas.width / 2, my = canvas.height / 2;
    for (let i = 0; i < number_of_points; i++) {
        let px = mulberry32(), py = mulberry32();
        let norm = Math.sqrt(px * px + py * py);
        if (type == 1) {
            norm = 1.0 / norm;
            px *= norm;
            py *= norm;
        } else if (type == 2) {
            if (norm > 1.0) { --i; continue; }
        } else if (type == 3) {
            const N = 3;
            let t = Math.atan2(py, px);
            t = Math.floor(t * N) * (2. * Math.PI / N);
            t = t * (1. + norm / 100.) + Math.PI * (1. + norm / 2.);
            px = norm * Math.cos(t);
            py = norm * Math.sin(t);
        }
        const scale = 0.6;
        points.push(new Point(scale * px * my + mx, scale * py * my + my));
    }
}

function movePoints(pts, amp) {
    if (!settings.rotate) {
        for (let p of pts) {
            p.x += amp * mulberry32() / 500.;
            p.y += amp * mulberry32() / 500.;
        }
    } else {
        let mx = 0., my = 0.;
        for (const p of pts) { mx += p.x; my += p.y; }
        mx /= pts.length; my /= pts.length;
        mx += mulberry32() * amp;
        my += mulberry32() * amp;
        rng.seed = 42364364;  // always the same radial speed distribution!
        for (let p of pts) {
            const dx = p.x - mx;
            const dy = p.y - my;
            const r = Math.sqrt(Norm2(dx, dy));
            const w = mulberry32() * 0.5 / r;
            p.x -= dy * w;
            p.y += dx * w;
        }
    }
}

// Fully connected graph
function makeAllPairs(pts) {
    const N = pts.length;
    let t = [];
    for (let i = 0; i < N - 1; ++i) {
        for (let j = i + 1; j < N; ++j) {
            let key = pts[i].Distance2(pts[j]);
            key = (key * N + i) * N + j;
            t.push(new Link(i, j, key));
        }
    }
    return t;
}

// BEGIN MAIN
const canvas = document.getElementById('main-canvas');
const m = canvas.getContext("2d");

// Fit the canvas to the available card width while keeping a sensible aspect.
function fitCanvas() {
    const wrap = canvas.parentElement;
    const w = Math.max(320, Math.floor(wrap.clientWidth));
    const isMobile = window.innerWidth <= 768;
    const h = isMobile ? Math.floor(w * 1.1)
                       : Math.max(400, Math.floor(w * 0.7));
    if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
    }
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// Generate points
const points = []
randomPoints();

// Mouse / finger tracking (used for Shortest-Paths anchor and click-to-add).
var mouse_pos = new Point(0., 0.);
canvas.addEventListener('pointermove', ev => {
    const [x, y] = canvasXY(canvas, ev);
    mouse_pos.x = x; mouse_pos.y = y;
});
canvas.addEventListener('pointerdown', ev => {
    const [x, y] = canvasXY(canvas, ev);
    points.push(new Point(x, y));
});
canvas.addEventListener('keydown', ev => {
    if (ev.key === ' ') { randomPoints(); ev.preventDefault(); }
});

// GUI
const gui = mkGui(document.getElementById('gui-container'), { title: 'Parameters' });
gui.add(settings, 'reset').name('Reset');
gui.add(settings, 'fps').name('frame rate').listen().disable();
gui.add(settings, 'count', 1, 1000, 1).name('Number of points').listen().onChange(randomPoints);
gui.add(settings, 'ctype', { square: 0, circle: 1, disc: 2, treskel: 3 })
   .name('Initial Pattern').listen().onChange(randomPoints);
gui.add(settings, 'jitter', 0, 100., .2).name('Jitter Amplitude').listen();
gui.add(settings, 'rotate').name('Rotate points').listen();
const draw = gui.addFolder('Drawings');
draw.add(settings, 'MST').name('Min-Spanning Tree').listen();
draw.add(settings, 'SPT').name('Shortest Paths').listen();
draw.add(settings, 'radius', 0, 10, 0.5).name('Radius').listen();
draw.addColor(settings, 'background_color').name('Background').listen();

const fps = makeFPS();

function update() {
    m.fillStyle = settings.background_color;
    m.fillRect(0, 0, canvas.width, canvas.height);

    m.font = '20px serif';
    m.fillStyle = 'white';

    movePoints(points, settings.jitter);

    if (settings.radius > 0.) {
        for (const a of points) drawCircle(m, a.x, a.y, 'white', settings.radius);
    }
    if (settings.MST) {
        let links = findMSTKruskal(makeAllPairs(points), points);
        let total_d = 0.;
        for (const l of links) {
            const Pi = points[l.i], Pj = points[l.j];
            drawLine(m, Pi.x, Pi.y, Pj.x, Pj.y, '#00ffc0');
            total_d += Math.sqrt(Pi.Distance2(Pj));
        }
        total_d = total_d.toFixed(0);
        m.fillStyle = '#00ffc0';
        m.fillText("Total Length: " + total_d, 10, canvas.height - 14);
    }
    if (settings.SPT) {
        let node0 = findNearest(points, mouse_pos);
        const P0 = points[node0];
        drawCircle(m, P0.x, P0.y, 'red', 5., true);
        const tree = fillSPTree(points, node0);
        const colors = [ '#ff8080', '#e08080', '#c08080',
                         '#b08080', '#808080', '#408080' ];
        for (let i = 0; i < tree.length; ++i) {
            const color = colors[Math.min(tree[i][3], colors.length - 1)];
            const A = points[i], B = points[tree[i][0]];
            drawLine(m, A.x, A.y, B.x, B.y, color);
        }
    }
    settings.fps = fps.tick();
    requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
