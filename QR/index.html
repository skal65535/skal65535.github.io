<!-- Generator for 'QRCode with picture' -->
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR Code Generator</title>
<link rel="stylesheet" href="../common/main.css">
<script src="./QRCode.js"></script>
<style>
  /* Intermediate canvases used by the dither pipeline; not shown. */
  #imagePixel { display: none; }

  .qr-canvases {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    align-items: flex-start;   /* don't stretch shorter canvases to row height */
    margin: 10px 0;
  }
  .qr-canvases canvas {
    background: var(--canvas-bg);
    border: 2px solid var(--canvas-border);
    border-radius: var(--radius-small);
    box-shadow: 0 0 6px rgba(0, 0, 0, 0.35);
    cursor: pointer;
    /* Display at native bitmap size — any CSS scaling here resamples the
       high-frequency dither and produces horizontal moiré, even with
       `image-rendering: pixelated` (browsers ignore it for some downscales). */
    image-rendering: crisp-edges;  /* Firefox */
    image-rendering: pixelated;    /* Chrome/Safari — wins over crisp-edges */
  }
  #output { background: #777; }

  .qr-text {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 640px;
    margin: 10px auto;
  }
  .qr-text textarea {
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 6px 8px;
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-small);
    background: #fff;
    color: var(--ink);
    resize: vertical;
    width: 100%;
    box-sizing: border-box;
  }

  .qr-controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px 18px;
    max-width: 880px;
    margin: 10px auto;
  }
  .qr-controls > label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: 13px;
    color: var(--ink);
  }
  .qr-controls select {
    font: inherit;
    font-size: 13px;
    padding: 4px 6px;
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-small);
    background: #fff;
    color: var(--ink);
    min-width: 130px;
  }
  .qr-controls .res {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-dim);
    margin-left: 6px;
  }
  .qr-controls .hint {
    grid-column: 1 / -1;
    font-size: 12px;
    color: var(--ink-dim);
    text-align: center;
  }
</style>
</head>

<body>

<div id="main-area">
  <a id="skal-back" href="https://skal65535.github.io/">‹ Home</a>
  <h2>QR Code Generator</h2>
  <p class="blurb">
    Drag and drop an image onto the card (or click the input canvas) and a
    halftoned QR code is embedded into it.
  </p>

  <div class="qr-canvases">
    <canvas id="imageInput" title="Click to choose an image"
            onclick='document.getElementById("file_dialog").click()'>
      <input id="file_dialog" type="file" style="display:none" accept="image/*"/>
    </canvas>
    <canvas id="imagePixel"></canvas>
    <canvas id="imageDithered" title="Dithered version"></canvas>
    <a id="download" href="about:blank" download="qr.webp" target="_blank" title="Download QR Code">
      <canvas id="output"></canvas>
    </a>
  </div>

  <div class="qr-text">
    <label for="text" style="font-size:13px;">Embedded text</label>
    <textarea id="text" rows="3" onchange="GenerateQRCode();">https://skal65535.github.io/QR</textarea>
    <div class="button-row" style="margin:0;">
      <button id="go" class="button" onclick="GenerateQRCode();">Generate QR Code</button>
    </div>
  </div>

  <div class="qr-controls">
    <label>Error correction
      <select id="error_level_selector" onchange="GenerateQRCode();">
        <option value="L">Low (7%)</option>
        <option value="M">Medium (15%)</option>
        <option value="Q">Quartile (25%)</option>
        <option value="H" selected>High (30%)</option>
      </select>
    </label>

    <label>QR size<span class="res" id="resolution"></span>
      <select id="size_selector" onchange="GenerateQRCode();">
        <option value="0">Auto</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6" selected>6</option>
        <option disabled>___</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
      </select>
    </label>

    <label>Background
      <select id="background" onchange="GenerateQRCode();">
        <option value="image" selected>Image (grayscale)</option>
        <option value="color">Image (color)</option>
        <option value="noise">Noise</option>
        <option value="trans">None</option>
      </select>
    </label>

    <label>Pixel size
      <select id="pixel_size_selector" onchange="GenerateQRCode();">
        <option value="1">1 × 1</option>
        <option value="2" selected>2 × 2</option>
        <option value="3">3 × 3</option>
        <option value="4">4 × 4</option>
      </select>
    </label>

    <label>Dithering
      <select id="dithering_selector" onchange="GenerateQRCode();">
        <option value="diffusion" selected>Diffusion</option>
        <option value="ordered">Ordered</option>
        <option value="random">Random</option>
        <option value="none">None</option>
      </select>
    </label>

    <label>Gray levels
      <select id="gray_selector" onchange="GenerateQRCode();">
        <option value="2" selected>2</option>
        <option value="4">4</option>
        <option value="16">16</option>
        <option value="256">All (256)</option>
      </select>
    </label>

    <label>Luminosity
      <select id="luma_selector" onchange="GenerateQRCode();">
        <option value="0">dark</option>
        <option value="128" selected>normal</option>
        <option value="255">light</option>
      </select>
    </label>

    <label>Alpha cutoff
      <select id="alpha_selector" onchange="GenerateQRCode();">
        <option value="0">(off)</option>
        <option value="64">low</option>
        <option value="128" selected>mid</option>
        <option value="255">high</option>
      </select>
    </label>

    <div class="hint">Alpha cutoff controls transparent areas.</div>
  </div>

  <p class="blurb small" style="text-align:center;">
    Original idea by <a href="https://codepen.io/xiongbinsh/full/goyobm">Xiong Bin</a>.
    See also <a href="https://cgv.cs.nthu.edu.tw/projects/Recreational_Graphics/Halftone_QRCodes">this paper</a>,
    as mentioned by <a href="https://www.realtimerendering.com/blog/cooler-qr-codes/">E. Haines</a>.
  </p>
</div>

<script src="./app.js" defer></script>

</body>
</html>
