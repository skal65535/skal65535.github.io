<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tree under gravity</title>
<link rel="stylesheet" href="../common/main.css">
</head>

<body>

<div id="main-area">
  <a id="skal-back" href="https://skal65535.github.io/" data-year="2023"></a>

  <h2>There's nothing special about the Root of a tree</h2>
  <p class="blurb small">
    This is just the visualization of a random tree.
  </p>
  <ul class="blurb small">
    <li>click or touch to drag nodes around</li>
    <li>double-Click or double-tap on a node to <b>promote</b> it to Root</li>
  </ul>

  <div class="canvas-wrap">
    <canvas id="main-canvas"></canvas>
    <div id="gui-container"></div>
  </div>
</div>

<script type="module">
"use strict";

import { mkGui }                  from '../common/controls.js';
import { onDrag, onDoubleTap }    from '../common/touch.js';
import { makeRng }                from '../common/utils.js';

////////////////////////////////////////////////////////////////////////////////
// The less interesting stuff

class Node {
 x = 0.;
 y = 0.;
 id = 0;
 parent = 0;
 mass = 0;   // total number of children
 constructor(x, y, id, parent) {
   this.x = x;
   this.y = y;
   this.dx = 0.;
   this.dy = 0.;
   this.ddx = 0.;
   this.ddy = 0.;
   this.id = id;
   this.parent = parent;
   this.mass = 0;
 }
}

const params = {  // Global parameters
  num_nodes: 150,
  nodes: [],
  root: 0,
  K: 5.0,    // string rigidity
  C: 1.2,    // viscosity
  R: .5,     // repulsive strength
  l0: .5,    // distance at rest
  dt: .01,   // time interval
  g: 1.0,
  xm: 0., xM: 1., ym: 0., yM: 1.,  // bounding box

  tid: -1,   // timer id
  focus_id: -1,

  reset: () => { Init(); },
  AddNode: () => {
    const id = params.nodes.length;
    const parent = Math.floor(mulberry32() * id);
    const x = mulberry32(), y = mulberry32();
    params.nodes.push(new Node(x, y, id, parent));
  },
  FindBounds: () => {
    let xm = 1e8, xM = -1e8, ym = 1e8, yM = -1e8;
    for (const n of params.nodes) {
      if (xm > n.x) xm = n.x;
      if (xM < n.x) xM = n.x;
      if (ym > n.y) ym = n.y;
      if (yM < n.y) yM = n.y;
    }
    const mid_x = 0.5 * (xm + xM);
    const mid_y = 0.5 * (ym + yM);
    const alpha = 1.2;
    xm = params.Mix(mid_x, xm, alpha);
    xM = params.Mix(mid_x, xM, alpha);
    ym = params.Mix(mid_y, ym, alpha);
    yM = params.Mix(mid_y, yM, alpha);
    return [xm, xM, ym, yM];
  },
  ResetNodes: () => {
    params.nodes = [];
    for (let i = 0; i < params.num_nodes; ++i) params.AddNode();
    [params.xm, params.xM, params.ym, params.yM] = params.FindBounds();
  },
  FindNode: (x, y) => {
    let id = -1;
    let closest = 0.5 * 0.5;  // maximum distance to find a node
    for (const n of params.nodes) {  // could be faster, yeah...
      const d = (n.x - x) * (n.x - x) + (n.y - y) * (n.y - y);
      if (d < closest) {
        closest = d;
        id = n.id;
      }
    }
    return id;
  },
  SetRoot: (root) => {
    // fix path to root
    let i = root, p = params.nodes[i].parent;
    while (i != p) {
      const P = params.nodes[p].parent;
      params.nodes[p].parent = i;
      i = p;
      p = P;
    }
    params.root = root;
    params.nodes[root].parent = root;   // loop at root (not required)
    // compute mass
    for (const n of params.nodes) n.mass = 0;
    for (let i = 0; i < params.num_nodes; ++i) {
      let j = i;
      do {
        params.nodes[j].mass += 1;
        j = params.nodes[j].parent;
      } while (j != root);
      params.nodes[root].mass += 1;
    }
  },

  // Map clientX/Y → world (bounding-box) coordinates. Uses the canvas's
  // *displayed* size so it works after CSS scaling on mobile.
  ScaleXY: (clientX, clientY) => {
    const canvas = document.querySelector("#main-canvas");
    const b = canvas.getBoundingClientRect();
    const u = (clientX - b.left) / b.width;
    const v = (clientY - b.top)  / b.height;
    return [params.xm + u * (params.xM - params.xm),
            params.ym + v * (params.yM - params.ym)];
  },

  // Drag handlers (driven by common/touch.js onDrag).
  DownEvent: ([x, y]) => { params.focus_id = params.FindNode(x, y); },
  MoveEvent: ([x, y]) => {
    if (params.focus_id < 0) return;
    const n = params.nodes[params.focus_id];
    n.x = x; n.y = y; n.dx = 0.; n.dy = 0.;
  },
  UpEvent:   () => { params.focus_id = -1; },
  SelectEvent: ([x, y]) => {
    const id = params.FindNode(x, y);
    if (id >= 0) params.SetRoot(id);
  },

  Anim: () => {
    for (let n of params.nodes) {
      n.ddx = 0.;
      n.ddy = params.g;
    }
    for (let n of params.nodes) {
      let p = params.nodes[n.parent];
      if (params.K > 0.) {
        const l0 = params.l0 * 10. / (10. + 25. * n.mass);
        const ux = p.x - n.x, uy = p.y - n.y;
        const d = Math.sqrt(ux * ux + uy * uy);
        const F = params.K * (d - l0) / d;
        n.ddx += F * ux;
        n.ddy += F * uy;
        p.ddx -= F * ux;
        p.ddy -= F * uy;
      }
      if (params.R > 0.) {
        const R = params.R / 10.;
        for (let p of params.nodes) {
          if (p.id == n.id) continue;
          const ux = p.x - n.x, uy = p.y - n.y;
          const d = Math.sqrt(ux * ux + uy * uy) - 0.01;
          if (d > 0.01) {
            n.ddx -= R * ux / d / d;
            n.ddy -= R * uy / d / d;
          }
        }
      }
      if (params.C > 0.) {      // viscosity
        n.ddx -= params.C * n.dx;
        n.ddy -= params.C * n.dy;
      }
    }
    for (let n of params.nodes) {
      if (n.id == params.nodes[params.root].id) continue;
      n.dx += params.dt * n.ddx;
      n.dy += params.dt * n.ddy;
      n.x += params.dt * n.dx;
      n.y += params.dt * n.dy;
    }
    if (params.root >= 0) {
      const n = params.nodes[params.root];
      n.dx = 0.; n.dy = 0.; n.ddx = 0.; n.ddy = 0.;
    }
    if (params.focus_id >= 0) {
      const n = params.nodes[params.focus_id];
      n.dx = 0.; n.dy = 0.;
    }
  },
  Mix: (a, b, x) => (1. - x) * a + x * b,
  Render: () => {
    const canvas = document.querySelector("#main-canvas");
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    const [xm, xM, ym, yM] = params.FindBounds();
    params.xm = params.Mix(params.xm, xm, .001);
    params.xM = params.Mix(params.xM, xM, .001);
    params.ym = params.Mix(params.ym, ym, .001);
    params.yM = params.Mix(params.yM, yM, .001);
    const scale_x = W / (params.xM - params.xm);
    const scale_y = H / (params.yM - params.ym);
    const scale = 5. / params.nodes.length;

    ctx.fillStyle = '#000000';
    ctx.clearRect(0, 0, W, H);
    ctx.font = "24px Arial";
    ctx.strokeStyle = '#000000';
    ctx.shadowBlur = 0.;
    ctx.lineWidth = 2;
    for (let n of params.nodes) {
      const radius = 3. * (1. + n.mass * scale);
      const X = (n.x - params.xm) * scale_x;
      const Y = (n.y - params.ym) * scale_y;
      if (n.id == params.root) ctx.fillText("root", X + 1.5 * radius, Y);
      const p = params.nodes[n.parent];
      const Xp = (p.x - params.xm) * scale_x;
      const Yp = (p.y - params.ym) * scale_y;
      ctx.beginPath();
      ctx.moveTo(X, Y);
      ctx.lineTo(Xp, Yp);
      ctx.stroke();
    }
    ctx.shadowBlur = 20;
    ctx.shadowColor = "black";
    for (let n of params.nodes) {
      const radius = 3. * (1. + n.mass * scale);
      const X = (n.x - params.xm) * scale_x;
      const Y = (n.y - params.ym) * scale_y;
      ctx.beginPath();
      if (n.parent == n.id) ctx.fillStyle = '#ff1020';
      else if (n.mass > 1) ctx.fillStyle = '#308020';
      else ctx.fillStyle = '#003300';
      ctx.arc(X, Y, radius, 0, 2 * Math.PI, false);
      ctx.fill();
    }
  },
};

const rng = makeRng();
const mulberry32 = () => rng.next01();

////////////////////////////////////////////////////////////////////////////////
// Main calls

function setupUI() {
  const gui = mkGui(document.getElementById('gui-container'), { title: 'Parameters' });
  gui.add(params, 'num_nodes', 1, 255, 1)  .name('Number of Nodes').onChange(Init);
  gui.add(params, 'K',  0.00, 20.,  0.1)   .name('Rigidity');
  gui.add(params, 'C',  0.00,  2.,  0.1)   .name('Viscosity');
  gui.add(params, 'R',  0.00,  1.,  0.1)   .name('Repulsion');
  gui.add(params, 'l0', 0.001, 1.,  0.01)  .name('Rest Length');
  gui.add(params, 'g',  0.01,  5.,  0.01)  .name('Gravity');
  gui.add(params, 'reset')                 .name('Reset');
}

function StartTimer() {
  ResetTimer();
  if (params.tid < 0) params.tid = setInterval(() => { Render(); });
}
function ResetTimer() {
  if (params.tid >= 0) { clearInterval(params.tid); params.tid = -1; }
}

function Init() {
  const canvas = document.querySelector("#main-canvas");
  const ctx = canvas.getContext("2d");
  if (ctx == null) { console.log("Can't get 2d-context."); return; }
  canvas.width  = 800;
  canvas.height = 600;

  params.ResetNodes();
  params.SetRoot(0);
  params.nodes[params.root].x = .5;
  params.nodes[params.root].y = .1;
  StartTimer();
}

function Render() {
  params.Anim();
  params.Render();
}

// ── Entry ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setupUI();
  Init();

  const canvas = document.querySelector("#main-canvas");
  onDrag(canvas, {
    down: ev => params.DownEvent(params.ScaleXY(ev.clientX, ev.clientY)),
    move: ev => params.MoveEvent(params.ScaleXY(ev.clientX, ev.clientY)),
    up:   ()  => params.UpEvent(),
    cancel: () => params.UpEvent(),
  });
  onDoubleTap(canvas, ev => params.SelectEvent(params.ScaleXY(ev.clientX, ev.clientY)));
});
</script>

</body>
</html>
